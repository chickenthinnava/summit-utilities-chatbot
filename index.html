<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summit Utilities AI Customer Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --green: #1a7a3c;
            --green-light: #22a050;
            --green-dark: #0f5228;
            --green-pale: #e8f5ee;
            --white: #ffffff;
            --gray: #f4f6f5;
            --text: #1a2e22;
            --text-light: #4a6355;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Background watermark */
        body::before {
            content: 'SUMMIT UTILITIES';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: clamp(40px, 8vw, 100px);
            color: var(--green);
            opacity: 0.05;
            white-space: nowrap;
            pointer-events: none;
            z-index: 0;
            letter-spacing: 0.1em;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 60%, var(--green-light) 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 20px rgba(26,122,60,0.3);
            position: relative;
            z-index: 10;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 20px;
            border: 2px solid rgba(255,255,255,0.3);
        }

        header h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            line-height: 1.2;
        }

        header p {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 2px;
        }

        .status-dot {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            opacity: 0.9;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #7fffb0;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Chat container */
        .chat-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .chat-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 10px;
        }

        /* Messages */
        .message {
            display: flex;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot { align-items: flex-start; }
        .message.user { flex-direction: row-reverse; }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--green-dark), var(--green-light));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
            font-family: 'Montserrat', sans-serif;
        }

        .bubble {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 0.92rem;
            line-height: 1.6;
        }

        .message.bot .bubble {
            background: white;
            color: var(--text);
            border-top-left-radius: 4px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .message.user .bubble {
            background: linear-gradient(135deg, var(--green), var(--green-light));
            color: white;
            border-top-right-radius: 4px;
        }

        /* Options grid */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }

        .option-btn {
            background: var(--green-pale);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 12px 14px;
            text-align: left;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--green-dark);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .option-btn:hover {
            background: var(--green);
            color: white;
            border-color: var(--green);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26,122,60,0.25);
        }

        .option-btn .icon { font-size: 1.1rem; }

        /* Back button */
        .back-btn {
            background: none;
            border: 2px solid var(--green);
            border-radius: 10px;
            padding: 8px 16px;
            color: var(--green);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 12px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--green);
            color: white;
        }

        /* Input area */
        .input-area {
            background: white;
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
            margin-top: 16px;
        }

        .input-area input {
            flex: 1;
            border: none;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.92rem;
            color: var(--text);
            background: none;
        }

        .input-area input::placeholder { color: #aab8b0; }

        .send-btn {
            background: linear-gradient(135deg, var(--green), var(--green-light));
            border: none;
            border-radius: 10px;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            font-size: 16px;
        }

        .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(26,122,60,0.3); }

        /* Form fields */
        .form-group {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group input, .form-group select, .form-group textarea {
            border: 2px solid #d0e8d8;
            border-radius: 10px;
            padding: 10px 14px;
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            outline: none;
            color: var(--text);
            transition: border 0.2s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--green);
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--green), var(--green-light));
            color: white;
            border: none;
            border-radius: 10px;
            padding: 11px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .submit-btn:hover { box-shadow: 0 4px 14px rgba(26,122,60,0.35); transform: translateY(-1px); }

        .info-card {
            background: var(--green-pale);
            border-left: 4px solid var(--green);
            border-radius: 10px;
            padding: 12px 14px;
            margin-top: 10px;
            font-size: 0.88rem;
            color: var(--text);
            line-height: 1.6;
        }

        @media (max-width: 480px) {
            .options-grid { grid-template-columns: 1fr; }
            header h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">SU</div>
    <div>
        <h1>Summit Utilities</h1>
        <p>AI Customer Service</p>
    </div>
    <div class="status-dot">
        <div class="dot"></div>
        Online
    </div>
</header>

<div class="chat-wrapper">
    <div class="chat-box" id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type a message..." onkeypress="handleKey(event)" />
        <button class="send-btn" onclick="handleTextInput()">➤</button>
    </div>
</div>

<script>
const mainMenu = [
    { icon: '💳', label: 'Pay Bill' },
    { icon: '📊', label: 'View Usage History' },
    { icon: '👤', label: 'Update Account Information' },
    { icon: '⚡', label: 'Report an Outage' },
    { icon: '🔍', label: 'Check Outage Status' },
    { icon: '🔧', label: 'Schedule a Technician Visit' },
    { icon: '❓', label: 'Billing Issues' },
    { icon: '🔄', label: 'Start, Stop, or Transfer Service' },
    { icon: '📄', label: 'Enroll in Paperless Billing' },
    { icon: '💡', label: 'Energy Saving Tips' },
    { icon: '💬', label: 'Additional Questions' },
];

function addMessage(content, type = 'bot') {
    const chatBox = document.getElementById('chatBox');
    const msg = document.createElement('div');
    msg.className = `message ${type}`;
    if (type === 'bot') {
        msg.innerHTML = `<div class="avatar">SU</div><div class="bubble">${content}</div>`;
    } else {
        msg.innerHTML = `<div class="bubble">${content}</div>`;
    }
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function showMainMenu() {
    const chatBox = document.getElementById('chatBox');
    const msg = document.createElement('div');
    msg.className = 'message bot';
    let btns = mainMenu.map(o =>
        `<button class="option-btn" onclick="selectOption('${o.label}')"><span class="icon">${o.icon}</span>${o.label}</button>`
    ).join('');
    msg.innerHTML = `<div class="avatar">SU</div><div class="bubble">How can I help you today? Please select an option:<div class="options-grid">${btns}</div></div>`;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function backToMenu() {
    addMessage('Going back to the main menu. How else can I help you?');
    showMainMenu();
}

function addBackButton(parentEl) {
    const btn = document.createElement('button');
    btn.className = 'back-btn';
    btn.textContent = '← Back to Main Menu';
    btn.onclick = backToMenu;
    parentEl.appendChild(btn);
}

function selectOption(option) {
    addMessage(option, 'user');
    const chatBox = document.getElementById('chatBox');

    setTimeout(() => {
        const msg = document.createElement('div');
        msg.className = 'message bot';
        let content = '';

        if (option === 'Pay Bill') {
            content = `<b>💳 Pay Your Bill</b><br>Please enter your account details to proceed with payment.<div class="form-group">
                <input type="text" placeholder="Account Number" id="accNum"/>
                <input type="text" placeholder="Full Name"/>
                <input type="number" placeholder="Amount to Pay ($)"/>
                <select><option>Credit/Debit Card</option><option>Bank Transfer (ACH)</option><option>PayPal</option></select>
                <button class="submit-btn" onclick="formSuccess('Payment of submitted successfully! A confirmation will be sent to your email.')">Submit Payment</button>
            </div>`;
        } else if (option === 'View Usage History') {
            content = `<b>📊 Usage History</b><br>Enter your account number to view your usage.<div class="form-group">
                <input type="text" placeholder="Account Number"/>
                <button class="submit-btn" onclick="formSuccess('Your usage history has been retrieved. Average monthly usage: 842 kWh. Last 3 months: Jan 910 kWh | Feb 870 kWh | Mar 756 kWh.')">View History</button>
            </div>`;
        } else if (option === 'Update Account Information') {
            content = `<b>👤 Update Account Info</b><br>What would you like to update?<div class="options-grid">
                <button class="option-btn" onclick="selectOption('Update Email')"><span class="icon">📧</span>Email Address</button>
                <button class="option-btn" onclick="selectOption('Update Phone')"><span class="icon">📱</span>Phone Number</button>
                <button class="option-btn" onclick="selectOption('Update Address')"><span class="icon">🏠</span>Mailing Address</button>
                <button class="option-btn" onclick="selectOption('Update Password')"><span class="icon">🔒</span>Password</button>
            </div>`;
        } else if (['Update Email','Update Phone','Update Address','Update Password'].includes(option)) {
            content = `<b>✏️ ${option}</b><br><div class="form-group">
                <input type="text" placeholder="Account Number"/>
                <input type="text" placeholder="New ${option.replace('Update ','')}"/>
                <input type="text" placeholder="Confirm New ${option.replace('Update ','')}"/>
                <button class="submit-btn" onclick="formSuccess('${option} updated successfully!')">Save Changes</button>
            </div>`;
        } else if (option === 'Report an Outage') {
            content = `<b>⚡ Report an Outage</b><br>We're sorry to hear you're experiencing an outage. Please provide details.<div class="form-group">
                <input type="text" placeholder="Account Number or Service Address"/>
                <input type="text" placeholder="Your Phone Number"/>
                <select><option>Complete Power Outage</option><option>Partial Outage</option><option>Flickering Lights</option><option>Gas Outage</option></select>
                <textarea placeholder="Any additional details (optional)" rows="3"></textarea>
                <button class="submit-btn" onclick="formSuccess('Outage reported! Reference #OUT-2026-4821. Our crew has been dispatched. Estimated restoration: 2-4 hours. You will receive SMS updates.')">Submit Report</button>
            </div>`;
        } else if (option === 'Check Outage Status') {
            content = `<b>🔍 Check Outage Status</b><br><div class="form-group">
                <input type="text" placeholder="Account Number or ZIP Code"/>
                <button class="submit-btn" onclick="formSuccess('No active outages in your area. If you are experiencing issues, please use Report an Outage. Last updated: Today at 3:00 PM.')">Check Status</button>
            </div>`;
        } else if (option === 'Schedule a Technician Visit') {
            content = `<b>🔧 Schedule a Technician Visit</b><br><div class="form-group">
                <input type="text" placeholder="Account Number"/>
                <input type="text" placeholder="Service Address"/>
                <select><option>Gas Leak Inspection</option><option>Meter Issue</option><option>New Installation</option><option>General Repair</option></select>
                <input type="date" placeholder="Preferred Date"/>
                <select><option>8 AM - 12 PM</option><option>12 PM - 4 PM</option><option>4 PM - 8 PM</option></select>
                <input type="text" placeholder="Your Phone Number"/>
                <button class="submit-btn" onclick="formSuccess('Technician visit scheduled! Confirmation #TECH-7741. You will receive a call 30 minutes before arrival.')">Confirm Appointment</button>
            </div>`;
        } else if (option === 'Billing Issues') {
            content = `<b>❓ Billing Issues</b><br>Select the type of billing issue:<div class="options-grid">
                <button class="option-btn" onclick="selectOption('Dispute a Charge')"><span class="icon">⚠️</span>Dispute a Charge</button>
                <button class="option-btn" onclick="selectOption('Request Payment Plan')"><span class="icon">📅</span>Payment Plan</button>
                <button class="option-btn" onclick="selectOption('Late Fee Waiver')"><span class="icon">🙏</span>Late Fee Waiver</button>
                <button class="option-btn" onclick="selectOption('Missing Payment')"><span class="icon">💸</span>Missing Payment</button>
            </div>`;
        } else if (['Dispute a Charge','Request Payment Plan','Late Fee Waiver','Missing Payment'].includes(option)) {
            content = `<b>${option}</b><br><div class="form-group">
                <input type="text" placeholder="Account Number"/>
                <input type="text" placeholder="Billing Period (e.g. Feb 2026)"/>
                <textarea placeholder="Describe your issue" rows="3"></textarea>
                <button class="submit-btn" onclick="formSuccess('Your ${option} request has been submitted. Case #BIL-3392. A billing specialist will contact you within 2 business days.')">Submit Request</button>
            </div>`;
        } else if (option === 'Start, Stop, or Transfer Service') {
            content = `<b>🔄 Service Management</b><br>What would you like to do?<div class="options-grid">
                <button class="option-btn" onclick="selectOption('Start Service')"><span class="icon">▶️</span>Start Service</button>
                <button class="option-btn" onclick="selectOption('Stop Service')"><span class="icon">⏹️</span>Stop Service</button>
                <button class="option-btn" onclick="selectOption('Transfer Service')"><span class="icon">🔀</span>Transfer Service</button>
            </div>`;
        } else if (['Start Service','Stop Service','Transfer Service'].includes(option)) {
            content = `<b>${option}</b><br><div class="form-group">
                <input type="text" placeholder="Account Number (if existing)"/>
                <input type="text" placeholder="Service Address"/>
                <input type="date" placeholder="Requested Date"/>
                <input type="text" placeholder="Your Phone Number"/>
                <button class="submit-btn" onclick="formSuccess('${option} request submitted! Confirmation #SVC-5519. You will be contacted within 1 business day.')">Submit Request</button>
            </div>`;
        } else if (option === 'Enroll in Paperless Billing') {
            content = `<b>📄 Paperless Billing</b><br>Go green and receive your bills by email!<div class="form-group">
                <input type="text" placeholder="Account Number"/>
                <input type="email" placeholder="Email Address for Bills"/>
                <button class="submit-btn" onclick="formSuccess('You are now enrolled in paperless billing! Your first e-bill will arrive next billing cycle. Thank you for going green! 🌱')">Enroll Now</button>
            </div>`;
        } else if (option === 'Energy Saving Tips') {
            content = `<b>💡 Energy Saving Tips</b><div class="info-card">
                🌡️ <b>Heating & Cooling:</b> Set thermostat to 68°F in winter, 78°F in summer.<br><br>
                💧 <b>Water Heater:</b> Lower to 120°F to save up to 10% on water heating.<br><br>
                🔌 <b>Phantom Loads:</b> Unplug electronics when not in use — they still draw power.<br><br>
                🪟 <b>Windows:</b> Use curtains/blinds to keep heat out in summer, in during winter.<br><br>
                💡 <b>LED Bulbs:</b> Switch to LED — uses 75% less energy than incandescent.<br><br>
                🌙 <b>Off-Peak Hours:</b> Run dishwasher/laundry after 9 PM for lower rates.
            </div>`;
        } else if (option === 'Additional Questions') {
            content = `<b>💬 Additional Questions</b><br>Type your question below and we'll do our best to help!<div class="form-group">
                <input type="text" placeholder="Account Number (optional)"/>
                <textarea placeholder="What's your question?" rows="4"></textarea>
                <button class="submit-btn" onclick="formSuccess('Thank you for your question! A customer service representative will respond via email within 24 hours. For urgent issues, call us at 1-800-SUMMIT-1.')">Send Question</button>
            </div>`;
        } else {
            content = `Thanks for reaching out about <b>${option}</b>. A representative will assist you shortly.`;
        }

        msg.innerHTML = `<div class="avatar">SU</div><div class="bubble" id="bubble-${Date.now()}">${content}</div>`;
        chatBox.appendChild(msg);
        addBackButton(msg.querySelector('.bubble'));
        chatBox.scrollTop = chatBox.scrollHeight;
    }, 400);
}

function formSuccess(msg) {
    addMessage(`✅ ${msg}`);
    setTimeout(() => {
        addMessage('Is there anything else I can help you with?');
        showMainMenu();
    }, 600);
}

function handleTextInput() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addMessage(text, 'user');
    setTimeout(() => {
        addMessage("Thanks for your message! For faster service, please select one of the options below.");
        showMainMenu();
    }, 400);
}

function handleKey(e) {
    if (e.key === 'Enter') handleTextInput();
}

// Init
window.onload = () => {
    addMessage("👋 Hello! Welcome to <b>Summit Utilities AI Customer Service</b>. I'm here to help you 24/7.");
    setTimeout(showMainMenu, 500);
};
</script>
</body>
</html>
